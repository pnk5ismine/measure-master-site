<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Measure Master — How to Use</title>

  <link rel="icon" type="image/png" href="/images/mm_logo.png" />

<style>
:root{
  --htu-bg: #f3faf5;              /* greenish white */
  --htu-page: #eef8f1;            /* page background */
  --htu-text: #111827;
  --htu-muted: #4b5563;
  --htu-border: rgba(31,41,55,.75);
  --htu-border-soft: rgba(31,41,55,.25);
  --htu-note: #dc2626;
}

  *{ box-sizing:border-box; }
  html, body{ margin:0; padding:0; }

body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans", sans-serif;
  background: var(--htu-page);
  color: var(--htu-text);
}
  /* =========================
     Header / frame
     ========================= */
  header{
    padding:14px 18px 10px;
    border-bottom:1px solid rgba(31,41,55,.12);
    background:#fff;
  }

  .header-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .logo{
    width:28px;
    height:28px;
    border-radius:8px;
    background:url("/images/mm_logo.png") center/contain no-repeat, #fff;
    border:1px solid rgba(31,41,55,.18);
  }

  .right{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .lang{
    display:flex;
    gap:6px;
  }

  .lang button{
    border:1px solid rgba(31,41,55,.18);
    background:#fff;
    border-radius:999px;
    padding:6px 10px;
    cursor:pointer;
  }

  .header-bottom{
    margin-top:10px;
  }

  nav{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }

  nav a{
    text-decoration:none;
    color:#374151;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(31,41,55,.12);
    background:#fff;
  }

  main{
    width:min(1180px, 70%);
    margin:0 auto;
    padding:18px 0 28px;
  }

  @media (max-width:900px){
    main{
      width:calc(100% - 24px);
    }
  }

.card.howtouse{
  background: var(--htu-bg);
  border: 1px solid rgba(31,41,55,.12);
  padding: 18px 14px 24px;
}

  .card.howtouse h1{
    margin:0 0 8px;
    font-size:1.55rem;
    text-align:center;
  }

  .muted{
    margin:0 0 18px;
    color:#6b7280;
    text-align:center;
    font-size:0.98rem;
    line-height:1.45;
  }

  footer{
    text-align:center;
    color:#6b7280;
    font-size:0.92rem;
    padding:20px 12px 30px;
  }

  /* =========================
     Phase containers
     ========================= */
  #htuSteps,
  #htuGallery,
  .htu-steps,
  .htu-groups{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:20px 18px;
    align-items:start;
    width:100%;
  }

  @media (max-width:900px){
    #htuSteps,
    #htuGallery,
    .htu-steps,
    .htu-groups{
      grid-template-columns:1fr;
      gap:18px;
    }
  }

  /* full width blocks */
  .htu-item--full,
  .htu-subject,
  .htu-title,
  .htu-remark,
  .htu-step-title,
  .htu-step-note{
    grid-column:1 / -1;
    width:100%;
  }

  /* =========================
     Hierarchy
     subject = maximum
     step-title/title = same medium
     note/remark = same level
     ========================= */

  /* 1) subject : largest */
.htu-subject{
  display:block;
  text-align:center;
  justify-self:stretch;
  align-self:start;

  font-weight:900;
  font-size:2.05rem;
  line-height:1.34;
  color:var(--htu-text);

  margin:16px 0 8px;
  padding:14px 16px 10px;

  border-top:2px solid rgba(31,41,55,.85);
  border-bottom:1px solid var(--htu-border-soft);
  background:transparent;
}

  /* 2) step-title + title : same medium */
.htu-step-title,
.htu-title{
  display:block;
  text-align:center;
  font-weight:800;
  font-size:1.45rem;
  line-height:1.36;
  color:var(--htu-text);

  margin:8px 0 0 0;
  padding:10px 14px 8px;

  border-top:1px solid var(--htu-border);
  border-left:1px solid var(--htu-border);
  border-right:1px solid var(--htu-border);
  border-bottom:none;
  background:var(--htu-bg);
}

  /* step-title can be slightly more left-oriented if wanted */
  .htu-step-title{
    text-align:left;
    margin:10px 0 2px;
    padding:12px 14px 8px;
    border-left:none;
    border-right:none;
    background:transparent;
  }

  /* 3) step-note + remark : same level */
.htu-step-note,
.htu-remark{
  display:block;
  text-align:left;
  font-size:0.96rem;
  line-height:1.42;
  color:var(--htu-note);

  margin:4px 0 10px;
  padding:8px 12px;

  border:1px solid var(--htu-border);
  background:var(--htu-bg);
}

  .htu-remark{
    text-align:center;
    margin:-6px 0 8px;
  }

  /* =========================
     Spacer
     ========================= */
  .htu-spacer{
    grid-column:1 / -1;
    width:100%;
    height:14px;
  }

  .htu-spacer--sm{ height:10px; }
  .htu-spacer--md{ height:18px; }
  .htu-spacer--lg{ height:28px; }

  /* =========================
     Cards
     ========================= */
.htu-card{
  display:flex;
  flex-direction:column;
  min-width:0;
  width:100%;
  margin-top:0;
  background:var(--htu-bg);
}

  .htu-card.htu-item--full{
    grid-column:1 / -1;
  }

.htu-card__media{
  border-top:1px solid var(--htu-border);
  border-right:1px solid var(--htu-border);
  border-bottom:1px solid var(--htu-border);
  border-left:1px solid var(--htu-border);
  overflow:hidden;
  background:#fff;
}

  .htu-card__media img{
    display:block;
    width:100%;
    height:100%;
    object-fit:contain;
    background:#fff;
  }

.htu-card__body{
  border-left:1px solid var(--htu-border);
  border-right:1px solid var(--htu-border);
  border-bottom:1px solid var(--htu-border);
  padding:9px 12px 10px;
  background:var(--htu-bg);
}

  .htu-card__body:empty{
    padding:0;
    min-height:0;
    border-bottom:1px solid var(--htu-border);
  }

  .htu-card__title{
    text-align:center;
    font-weight:800;
    font-size:1.18rem;
    line-height:1.4;
    color:var(--htu-text);
    margin:0 0 8px;
  }

  /* =========================
     Body text
     step-body + card body = same level, tighter spacing
     ========================= */

  .htu-body{
    font-size:0.97rem;
    line-height:1.18;
    color:var(--htu-muted);
    word-break:keep-all;
    overflow-wrap:anywhere;
  }

  .htu-body + .htu-body{
    margin-top:4px;
  }

  .htu-body--left{ text-align:left; }
  .htu-body--center{ text-align:center; }
  .htu-body--right{ text-align:right; }

  .htu-body-row{
    display:flex;
    gap:12px;
    align-items:flex-start;
    justify-content:space-between;
  }

  .htu-body-row .htu-body{
    flex:1 1 0;
    margin-top:0;
  }

  /* step body */
  .htu-step-body{
    grid-column:1 / -1;
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:1px 2px;
    color:var(--htu-muted);
    font-size:0.97rem;
    line-height:1.18;
  }

  .htu-step-num{
    flex:0 0 auto;
    min-width:24px;
    font-weight:800;
    color:var(--htu-text);
  }

  .htu-step-text{
    flex:1 1 auto;
    min-width:0;
  }

  /* =========================
     Visual cleanup
     ========================= */
  .htu-card,
  .htu-title,
  .htu-remark,
  .htu-step-note{
    box-shadow:none;
    border-radius:0;
  }

  /* =========================
     Mobile tuning
     ========================= */
  @media (max-width:900px){
.htu-subject{
  font-size:1.62rem;
  padding:12px 12px 8px;
  margin:14px 0 6px;
}

.htu-step-title,
.htu-title{
  font-size:1.18rem;
  padding:9px 12px 7px;
}

    .htu-card__body{
      padding:8px 10px 9px;
    }

    .htu-body{
      font-size:0.94rem;
      line-height:1.16;
    }

    .htu-step-body{
      font-size:0.94rem;
      line-height:1.16;
    }

    .htu-step-note,
    .htu-remark{
      font-size:0.92rem;
      line-height:1.38;
      padding:8px 10px;
    }
  }

.htu-step-image{
  grid-column: 1 / -1;
  width: 100%;
  margin: 4px 0 10px;
  border-left: 1px solid var(--htu-border);
  border-right: 1px solid var(--htu-border);
  background: #fff;
  overflow: hidden;
}

.htu-step-image img{
  display: block;
  width: 100%;
  height: auto;
  object-fit: contain;
  background: #fff;
}

.htu-title + .htu-card{
  margin-top:0 !important;
}
</style>

</head>
<body>
<header>
  <div class="header-top">
    <div class="brand">
      <div class="logo" aria-hidden="true"></div>
      <strong>Measure Master</strong>
    </div>

    <div class="right">
      <div class="lang">
        <button type="button" data-lang-btn="ko">
          <span class="flag" aria-hidden="true">🇰🇷</span>
          <span class="label">KO</span>
        </button>
        <button type="button" data-lang-btn="en">
          <span class="flag" aria-hidden="true">🇺🇸</span>
          <span class="label">EN</span>
        </button>
      </div>
    </div>
  </div>

  <div class="header-bottom">
    <nav>
      <a href="/index.html" data-i18n="idx.nav.home">Home</a>
      <a href="/howtouse.html" data-i18n="idx.nav.howtouse">How to use</a>
      <a href="/reviews.html" data-i18n="idx.nav.reviews">Reviews</a>
      <a href="/privacy.html" data-i18n="idx.nav.privacy">Privacy</a>
    </nav>
  </div>
</header>

<main>
  <section class="card howtouse">
    <h1>How to use Measure Master</h1>
    <p class="muted">
      Tap or click an image to open the full-size version in a new tab.
    </p>

    <div id="htuSteps" class="htu-steps"></div>
    <div id="htuGallery" class="htu-groups"></div>
  </section>
</main>

<footer>
  © <span id="year"></span> Measure Master. All rights reserved.
</footer>

<script src="/assets/js/i18n.js?v=mm_i18n_r9"></script>
<script>
(function () {
  const STEP_DATA_URL = "/assets/data/htu_000_layout.json";
  const GALLERY_DATA_URL = "/assets/data/htu_100_layout.json";

  function tBySid(sid) {
    if (!sid) return "";
    if (window.mmI18n && typeof window.mmI18n.t === "function") {
      return window.mmI18n.t(sid);
    }
    return sid;
  }

  function resolveTextSpec(spec) {
    if (typeof spec === "string") {
      return { sid: spec, align: "left", dx: "0px" };
    }
    return {
      sid: spec?.sid || "",
      align: spec?.align || "left",
      dx: spec?.dx || "0px"
    };
  }

  function makeBodyLine(spec) {
    const s = resolveTextSpec(spec);
    const el = document.createElement("div");
    el.className = "htu-body htu-body--" + (s.align || "left");
    el.textContent = tBySid(s.sid);

    if (s.dx && s.dx !== "0px") {
      el.style.position = "relative";
      el.style.left = s.dx;
    }
    return el;
  }

  function makeBodyRow(rowSpecs) {
    const row = document.createElement("div");
    row.className = "htu-body-row";
    (rowSpecs || []).forEach(spec => {
      row.appendChild(makeBodyLine(spec));
    });
    return row;
  }

  function buildSubject(item) {
    const el = document.createElement("div");
    el.className = "htu-subject";
    el.textContent = tBySid(item.sid);
    return el;
  }

  function buildTitle(item) {
    const el = document.createElement("div");
    el.className = "htu-title";
    if (item.fullWidth) el.classList.add("htu-item--full");
    el.textContent = tBySid(item.sid);

    if (item.align === "left") el.style.textAlign = "left";
    if (item.align === "right") el.style.textAlign = "right";
    if (item.align === "center") el.style.textAlign = "center";

    return el;
  }

  function buildRemark(item) {
    const el = document.createElement("div");
    el.className = "htu-remark";
    if (item.fullWidth !== false) el.classList.add("htu-item--full");
    el.textContent = tBySid(item.sid);

    if (item.align === "left") el.style.textAlign = "left";
    if (item.align === "right") el.style.textAlign = "right";
    if (item.align === "center") el.style.textAlign = "center";

    return el;
  }

  function buildSpacer(item) {
    const el = document.createElement("div");
    el.className = "htu-spacer";
    el.classList.add("htu-spacer--" + (item.size || "md"));
    el.classList.add("htu-item--full");
    return el;
  }

  function buildCard(item) {
    const card = document.createElement("article");
    card.className = "htu-card";
    if (item.fullWidth) card.classList.add("htu-item--full");

    const media = document.createElement("div");
    media.className = "htu-card__media";

    if (item.ratio) {
      media.style.aspectRatio = item.ratio;
    }

    const img = document.createElement("img");
    img.src = item.src || "";
    img.alt = tBySid(item.altSid || "");
    img.loading = "lazy";
    img.decoding = "async";
    img.style.objectFit = item.fit || "contain";

    media.appendChild(img);
    card.appendChild(media);

    const hasTitle = !!(item.titleSid && String(item.titleSid).trim());
    const hasBodySids = Array.isArray(item.bodySids) && item.bodySids.length > 0;
    const hasBodyRows = Array.isArray(item.bodyRows) && item.bodyRows.length > 0;

    if (hasTitle || hasBodySids || hasBodyRows) {
      const body = document.createElement("div");
      body.className = "htu-card__body";

      if (hasTitle) {
        const title = document.createElement("div");
        title.className = "htu-card__title";
        title.textContent = tBySid(item.titleSid);
        body.appendChild(title);
      }

      if (hasBodyRows) {
        item.bodyRows.forEach(rowSpecs => {
          body.appendChild(makeBodyRow(rowSpecs));
        });
      } else if (hasBodySids) {
        item.bodySids.forEach(spec => {
          body.appendChild(makeBodyLine(spec));
        });
      }

      card.appendChild(body);
    }

    return card;
  }

  function buildStepTitle(item) {
    const el = document.createElement("div");
    el.className = "htu-step-title";
    el.textContent = tBySid(item.sid);
    return el;
  }

  function buildStepBody(item) {
    const row = document.createElement("div");
    row.className = "htu-step-body";

    const num = document.createElement("div");
    num.className = "htu-step-num";
    num.textContent = (item.num != null ? item.num + "." : "");

    const text = document.createElement("div");
    text.className = "htu-step-text";
    text.textContent = tBySid(item.sid);

    row.appendChild(num);
    row.appendChild(text);
    return row;
  }

  function buildStepNote(item) {
    const el = document.createElement("div");
    el.className = "htu-step-note";
    el.textContent = tBySid(item.sid);
    return el;
  }

  function buildStepImage(stepIndex) {
    const wrap = document.createElement("div");
    wrap.className = "htu-step-image htu-item--full";

    const img = document.createElement("img");
    img.src = "/images/howtouse/howtouse_step" + stepIndex + ".jpg";
    img.alt = "How to use step " + stepIndex;
    img.loading = "lazy";
    img.decoding = "async";

    img.addEventListener("error", function () {
      console.warn("Step image not found:", img.src);
      wrap.style.display = "none";
    });

    wrap.appendChild(img);
    return wrap;
  }

  function renderItemsTo(containerId, items) {
    const grid = document.getElementById(containerId);
    if (!grid) {
      console.error("HowToUse container not found:", containerId);
      return;
    }

    grid.innerHTML = "";

    let stepTitleIndex = 0;

    items.forEach(item => {
      if (!item || !item.kind) return;

      let node = null;

      switch (item.kind) {
        case "subject":
          node = buildSubject(item);
          break;

        case "title":
          node = buildTitle(item);
          break;

        case "remark":
          node = buildRemark(item);
          break;

        case "spacer":
          node = buildSpacer(item);
          break;

        case "card":
          node = buildCard(item);
          break;

        case "step_title":
          node = buildStepTitle(item);
          break;

        case "step_body":
          node = buildStepBody(item);
          break;

        case "step_note":
          node = buildStepNote(item);
          break;

        default:
          console.warn("Unknown howtouse item kind:", item.kind, item);
          break;
      }

      if (node) {
        node.setAttribute("data-htu-id", item.id || "");
        grid.appendChild(node);

        if (containerId === "htuSteps" && item.kind === "step_title") {
          stepTitleIndex += 1;
          const imgNode = buildStepImage(stepTitleIndex);
          imgNode.setAttribute("data-step-image", String(stepTitleIndex));
          grid.appendChild(imgNode);
        }
      }
    });
  }

  async function loadItems(url) {
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) {
      throw new Error("Failed to load layout: " + url + " (" + res.status + ")");
    }
    return await res.json();
  }

  async function bootHowToUse() {
    try {
      const [stepItems, galleryItems] = await Promise.all([
        loadItems(STEP_DATA_URL),
        loadItems(GALLERY_DATA_URL)
      ]);

      console.log("HTU step items:", stepItems.map(x => x.id + ":" + x.kind));
      console.log("HTU gallery items:", galleryItems.map(x => x.id + ":" + x.kind));

      renderItemsTo("htuSteps", stepItems);
      renderItemsTo("htuGallery", galleryItems);
    } catch (err) {
      console.error(err);

      const steps = document.getElementById("htuSteps");
      const gallery = document.getElementById("htuGallery");

      if (steps) {
        steps.innerHTML = '<div class="htu-step-note">Failed to load Phase 2 layout.</div>';
      }
      if (gallery) {
        gallery.innerHTML = '<div class="htu-remark">Failed to load Phase 3 layout.</div>';
      }
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    const yearEl = document.getElementById("year");
    if (yearEl) yearEl.textContent = String(new Date().getFullYear());

    bootHowToUse();

    document.addEventListener("mm:i18n-updated", function () {
      bootHowToUse();
    });
  });
})();
</script>
</body>
</html>
