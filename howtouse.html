<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Measure Master — How to Use</title>

  <link rel="icon" type="image/png" href="/images/mm_logo.png" />
  <link rel="preload" as="image" href="/images/mm_logo.png" />

  <style>
/* =========================
   HowToUse layout - full CSS block
   ========================= */

:root{
  --htu-bg: #ffffff;
  --htu-text: #111827;
  --htu-muted: #4b5563;
  --htu-border: rgba(31,41,55,.75);
  --htu-border-soft: rgba(31,41,55,.25);
  --htu-remark: #dc2626;
}

/* page wrapper */
.htu-wrap{
  width:min(1180px, calc(100% - 24px));
  margin:0 auto;
  padding:18px 0 28px;
}

/* 2-column grid */
.htu-grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:20px 18px;
  align-items:start;
}

/* mobile: single column */
@media (max-width: 900px){
  .htu-grid{
    grid-template-columns:1fr;
    gap:18px;
  }
}

/* full-width items */
.htu-item--full,
.htu-subject,
.htu-title,
.htu-remark{
  grid-column:1 / -1;
}

/* section subject */
.htu-subject{
  text-align:center;
  font-weight:800;
  font-size:1.3rem;
  line-height:1.35;
  color:var(--htu-text);

  margin:12px 0 4px;
  padding:14px 16px 10px;

  border-top:2px solid rgba(31,41,55,.85);
  border-bottom:1px solid var(--htu-border-soft);
  background:transparent;
}

/* title above paired cards */
.htu-title{
  text-align:center;
  font-weight:700;
  font-size:1.12rem;
  line-height:1.35;
  color:var(--htu-text);

  margin:2px 0 -8px;
  padding:10px 14px 8px;

  border-top:1px solid var(--htu-border);
  border-left:1px solid var(--htu-border);
  border-right:1px solid var(--htu-border);
  background:var(--htu-bg);
}

/* generic spacer */
.htu-spacer{
  grid-column:1 / -1;
  width:100%;
  height:14px;
}

.htu-spacer--sm{ height:10px; }
.htu-spacer--md{ height:18px; }
.htu-spacer--lg{ height:28px; }

/* image card */
.htu-card{
  display:flex;
  flex-direction:column;
  min-width:0;
  background:var(--htu-bg);
}

/* media area */
.htu-card__media{
  border-left:1px solid var(--htu-border);
  border-right:1px solid var(--htu-border);
  overflow:hidden;
  background:#fff;
}

/* image itself */
.htu-card__media img{
  display:block;
  width:100%;
  height:100%;
  object-fit:contain;
  background:#fff;
}

/* body area */
.htu-card__body{
  border-left:1px solid var(--htu-border);
  border-right:1px solid var(--htu-border);
  border-bottom:1px solid var(--htu-border);
  padding:10px 12px 12px;
  background:var(--htu-bg);
}

/* empty body allowed */
.htu-card__body:empty{
  padding:0;
  min-height:0;
  border-bottom:1px solid var(--htu-border);
}

/* paragraph text */
.htu-body{
  font-size:0.98rem;
  line-height:1.6;
  color:var(--htu-muted);
  word-break:keep-all;
  overflow-wrap:anywhere;
}

.htu-body + .htu-body{
  margin-top:6px;
}

.htu-body--left{ text-align:left; }
.htu-body--center{ text-align:center; }
.htu-body--right{ text-align:right; }

/* optional row grouping */
.htu-body-row{
  display:flex;
  gap:12px;
  align-items:flex-start;
  justify-content:space-between;
}

.htu-body-row .htu-body{
  flex:1 1 0;
  margin-top:0;
}

/* remark line */
.htu-remark{
  text-align:center;
  font-size:0.98rem;
  line-height:1.55;
  color:var(--htu-remark);

  margin:-8px 0 6px;
  padding:10px 14px;

  border:1px solid var(--htu-border);
  background:#fff;
}

/* full-width card (for 2:1 landscape items) */
.htu-card.htu-item--full{
  grid-column:1 / -1;
}

/* optional subtle visual rhythm */
.htu-card,
.htu-title,
.htu-remark{
  box-shadow:none;
  border-radius:0;
}

/* if you want slightly tighter mobile spacing */
@media (max-width: 900px){
  .htu-subject{
    font-size:1.18rem;
    padding:12px 12px 8px;
  }

  .htu-title{
    font-size:1.04rem;
    padding:9px 12px 7px;
  }

  .htu-card__body{
    padding:9px 10px 10px;
  }

  .htu-body{
    font-size:0.95rem;
    line-height:1.55;
  }

  .htu-remark{
    font-size:0.95rem;
    padding:9px 12px;
  }
}
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="brand">
      <div class="logo" aria-hidden="true"></div>
      <strong>Measure Master</strong>
    </div>

    <div class="right">
      <div class="lang">
        <button type="button" data-lang-btn="ko">
          <span class="flag" aria-hidden="true">🇰🇷</span>
          <span class="label">KO</span>
        </button>
        <button type="button" data-lang-btn="en">
          <span class="flag" aria-hidden="true">🇺🇸</span>
          <span class="label">EN</span>
        </button>
      </div>
    </div>
  </div>

  <div class="header-bottom">
    <nav>
      <a href="/index.html" data-i18n="idx.nav.home">Home</a>
      <a href="/howtouse.html" data-i18n="idx.nav.howtouse">How to use</a>
      <a href="/reviews.html" data-i18n="idx.nav.reviews">Reviews</a>
      <a href="/privacy.html" data-i18n="idx.nav.privacy">Privacy</a>
    </nav>
  </div>
</header>

<main>
  <section class="card howtouse">
    <h1>How to use Measure Master</h1>
    <p class="muted">
      Tap or click an image to open the full-size version in a new tab.
    </p>

    <div id="htuSteps" class="htu-steps"></div>
    <div id="htuGallery" class="htu-groups"></div>
  </section>
</main>

<footer>
  © <span id="year"></span> Measure Master. All rights reserved.
</footer>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var y = document.getElementById('year');
    if (y) y.textContent = new Date().getFullYear();
  });
</script>

<script>
(function(){
  const URLS = {
    phase2Layout: "/assets/data/htu_000_layout.json",
    phase3Layout: "/assets/data/htu_100_layout.json",
    strings: (lang) => `/assets/data/strings_${lang}.json`
  };

  function applyLangToLinks(){
    const lang = getLang();
    document.querySelectorAll('nav a[href^="/"]').forEach(a => {
      const href = a.getAttribute("href");
      if (!href) return;
      const u = new URL(href, location.origin);
      u.searchParams.set("lang", lang);
      a.setAttribute("href", u.pathname + u.search);
    });
  }

  function getLang(){
    const u = new URL(location.href);
    const q = (u.searchParams.get("lang") || "").toLowerCase();
    const saved = (localStorage.getItem("mm_lang") || "").toLowerCase();
    const lang = (q || saved || "en");
    return (lang === "kr") ? "ko" : lang;
  }

  function setLang(lang){
    lang = (String(lang || "").toLowerCase() === "kr") ? "ko" : String(lang || "").toLowerCase();
    localStorage.setItem("mm_lang", lang);

    const u = new URL(location.href);
    u.searchParams.set("lang", lang);
    history.replaceState(null, "", u.toString());
  }

  function t(strings, sid){
    return (strings && sid && strings[sid]) ? strings[sid] : (sid || "");
  }

  function setLangButtonsActive(lang){
    document.querySelectorAll("[data-lang-btn]").forEach(btn => {
      btn.classList.toggle("active", btn.getAttribute("data-lang-btn") === lang);
    });
  }

  function groupIntoSteps(rows){
    const steps = [];
    let cur = null;

    for (const r of rows){
      if (!r || typeof r !== "object") continue;
      const kind = String(r.kind ?? "").trim();

      if (kind === "step_title"){
        cur = { sid: r.sid ?? r.id ?? "", id: r.id ?? "", items: [] };
        steps.push(cur);
        continue;
      }

      if (!cur){
        cur = { sid: "htu_000", id: "htu_000", items: [] };
        steps.push(cur);
      }

      cur.items.push({
        kind,
        sid: r.sid ?? r.id ?? "",
        num: r.num
      });
    }
    return steps;
  }

  function renderPhase2(steps, strings){
    const host = document.getElementById("htuSteps");
    if (!host) return;

    host.innerHTML = "";

    for (const st of steps){
      const box = document.createElement("section");
      box.className = "htu-step";

      const h2 = document.createElement("h2");
      h2.className = "htu-step-title";
      h2.appendChild(document.createTextNode(t(strings, st.sid)));
      box.appendChild(h2);

      let ol = null;
      const flushOl = () => {
        if (ol){
          box.appendChild(ol);
          ol = null;
        }
      };

      for (const it of st.items){
        if (it.kind === "step_body"){
          if (!ol) ol = document.createElement("ol");

          const li = document.createElement("li");
          if (typeof it.num === "number") li.value = it.num;
          li.textContent = t(strings, it.sid);
          ol.appendChild(li);
        } else {
          flushOl();
          const p = document.createElement("p");
          p.className = "htu-note";
          p.textContent = t(strings, it.sid);
          box.appendChild(p);
        }
      }
      flushOl();

      const stepNo = steps.indexOf(st) + 1;

      if (stepNo != null) {
        const imgBox = document.createElement("div");
        imgBox.className = "htu-step-image";

        const imgUrl = `/images/howtouse/howtouse_step${stepNo}.jpg`;

        const a = document.createElement("a");
        a.href = imgUrl;
        a.target = "_blank";
        a.rel = "noopener";

        const img = document.createElement("img");
        img.src = imgUrl;
        img.alt = `HowToUse Step ${stepNo}`;
        img.loading = "lazy";

        a.appendChild(img);
        imgBox.appendChild(a);
        box.appendChild(imgBox);
      }

      host.appendChild(box);
    }
  }

function renderPhase3(layout, strings){
  const host = document.getElementById("htuGallery");
  if (!host) return;

  host.innerHTML = "";

  let grid = null;
  const flushGrid = () => {
    if (grid){
      host.appendChild(grid);
      grid = null;
    }
  };

  for (const node of layout){
    if (!node || typeof node !== "object") continue;

    if (node.kind === "subject"){
      flushGrid();
      const band = document.createElement("div");
      band.className = "htu-subject";
      band.textContent = t(strings, node.sid);
      host.appendChild(band);
      continue;
    }

    if (node.kind === "spacer"){
      flushGrid();
      const sp = document.createElement("div");
      sp.className = `htu-spacer ${(node.size || "md")}`;
      host.appendChild(sp);
      continue;
    }

    if (node.kind === "card"){
      if (!grid){
        grid = document.createElement("div");
        grid.className = "htu-grid";
      }

      const card = document.createElement("article");
      card.className = "htu-card";

      // title
      if (node.titleSid){
        const copyTop = document.createElement("div");
        copyTop.className = "htu-copy-top";

        const h3 = document.createElement("h3");
        h3.className = "htu-copy-title";
        h3.textContent = t(strings, node.titleSid);

        copyTop.appendChild(h3);
        card.appendChild(copyTop);
      }

      // image
      const thumb = document.createElement("a");
      thumb.className = "htu-thumb";
      thumb.href = node.src;
      thumb.target = "_blank";
      thumb.rel = "noopener";

      if (node.ratio) {
        thumb.style.setProperty("--thumb-ratio", node.ratio);
      }
      if (node.fit) {
        thumb.style.setProperty("--thumb-fit", node.fit);
      }

      const img = document.createElement("img");
      img.src = node.src;
      img.alt = t(strings, node.altSid);
      img.loading = "lazy";
      thumb.appendChild(img);

      card.appendChild(thumb);

      const hasBody =
        (Array.isArray(node.bodySids) && node.bodySids.length) ||
        (Array.isArray(node.bodyRows) && node.bodyRows.length) ||
        (Array.isArray(node.listSids) && node.listSids.length);

      if (hasBody){
        const copy = document.createElement("div");
        copy.className = "htu-copy";

        // bodySids
        if (Array.isArray(node.bodySids) && node.bodySids.length){
          for (const item of node.bodySids){
            const p = document.createElement("p");
            p.className = "htu-copy-body";

            if (typeof item === "string") {
              p.textContent = t(strings, item);
            } else if (item && typeof item === "object") {
              p.textContent = t(strings, item.sid);

              if (item.align) p.style.textAlign = item.align;
              if (item.dx) {
                p.style.position = "relative";
                p.style.left = item.dx;
              }
              if (item.className) p.classList.add(item.className);
            }

            copy.appendChild(p);
          }
        }

        // bodyRows
        if (Array.isArray(node.bodyRows) && node.bodyRows.length){
          const rowsWrap = document.createElement("div");
          rowsWrap.className = "htu-copy-rows";

          for (const row of node.bodyRows){
            const rowDiv = document.createElement("div");
            rowDiv.className = "htu-copy-row " + (row.length === 1 ? "cols-1" : "cols-2");

            for (const item of row){
              const p = document.createElement("p");
              p.className = "htu-copy-body";

              if (typeof item === "string") {
                p.textContent = t(strings, item);
              } else if (item && typeof item === "object") {
                p.textContent = t(strings, item.sid);

                if (item.align) p.style.textAlign = item.align;
                if (item.dx) {
                  p.style.position = "relative";
                  p.style.left = item.dx;
                }
                if (item.className) p.classList.add(item.className);
              }

              rowDiv.appendChild(p);
            }

            rowsWrap.appendChild(rowDiv);
          }

          copy.appendChild(rowsWrap);
        }

        // listSids
        if (Array.isArray(node.listSids) && node.listSids.length){
          const ul = document.createElement("ul");
          ul.className = "htu-copy-list";

          for (const sid of node.listSids){
            const li = document.createElement("li");
            li.textContent = t(strings, sid);
            ul.appendChild(li);
          }

          copy.appendChild(ul);
        }

        card.appendChild(copy);
      }

      grid.appendChild(card);
    }
  }

  flushGrid();
}


  function applyNavI18n(strings){
    document.querySelectorAll("[data-i18n]").forEach(el=>{
      const key = el.getAttribute("data-i18n");
      if (key && strings[key]) {
        el.textContent = strings[key];
      }
    });
  }

  async function loadAllAndRender(){
    const lang = getLang();
    setLang(lang);
    applyLangToLinks();
    setLangButtonsActive(lang);

    const [p2Res, p3Res, strRes] = await Promise.all([
      fetch(URLS.phase2Layout, { cache: "no-store" }),
      fetch(URLS.phase3Layout, { cache: "no-store" }),
      fetch(URLS.strings(lang), { cache: "no-store" })
    ]);

    if (!p2Res.ok) throw new Error("Phase2 layout HTTP " + p2Res.status);
    if (!p3Res.ok) throw new Error("Phase3 layout HTTP " + p3Res.status);
    if (!strRes.ok) throw new Error("Strings HTTP " + strRes.status);

    const [p2Layout, p3Layout, strings] = await Promise.all([
      p2Res.json(), p3Res.json(), strRes.json()
    ]);

    applyNavI18n(strings);

    if (Array.isArray(p2Layout)){
      const steps = groupIntoSteps(p2Layout);
      renderPhase2(steps, strings);
    }
    if (Array.isArray(p3Layout)){
      renderPhase3(p3Layout, strings);
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll("[data-lang-btn]").forEach(btn => {
      btn.addEventListener("click", () => {
        const lang = btn.getAttribute("data-lang-btn");
        setLang(lang);
        loadAllAndRender().catch(e => console.warn("[HTU] render failed:", e));
      });
    });

    loadAllAndRender().catch(e => console.warn("[HTU] render failed:", e));
  });
})();
</script>
</body>
</html>
