<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Measure Master — How to Use</title>

  <link rel="icon" type="image/png" href="/images/mm_logo.png" />
  <link rel="preload" as="image" href="/images/mm_logo.png" />

  <style>
/* =========================
   HowToUse layout - full CSS block
   ========================= */

:root{
  --htu-bg: #ffffff;
  --htu-text: #111827;
  --htu-muted: #4b5563;
  --htu-border: rgba(31,41,55,.75);
  --htu-border-soft: rgba(31,41,55,.25);
  --htu-remark: #dc2626;
}

/* page wrapper */
.htu-wrap{
  width:min(1180px, calc(100% - 24px));
  margin:0 auto;
  padding:18px 0 28px;
}

/* 2-column grid */
.htu-grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:20px 18px;
  align-items:start;
}

/* mobile: single column */
@media (max-width: 900px){
  .htu-grid{
    grid-template-columns:1fr;
    gap:18px;
  }
}

/* full-width items */
.htu-item--full,
.htu-subject,
.htu-title,
.htu-remark{
  grid-column:1 / -1;
}

/* section subject */
.htu-subject{
  text-align:center;
  font-weight:800;
  font-size:1.3rem;
  line-height:1.35;
  color:var(--htu-text);

  margin:12px 0 4px;
  padding:14px 16px 10px;

  border-top:2px solid rgba(31,41,55,.85);
  border-bottom:1px solid var(--htu-border-soft);
  background:transparent;
}

/* title above paired cards */
.htu-title{
  text-align:center;
  font-weight:700;
  font-size:1.12rem;
  line-height:1.35;
  color:var(--htu-text);

  margin:2px 0 -8px;
  padding:10px 14px 8px;

  border-top:1px solid var(--htu-border);
  border-left:1px solid var(--htu-border);
  border-right:1px solid var(--htu-border);
  background:var(--htu-bg);
}

/* generic spacer */
.htu-spacer{
  grid-column:1 / -1;
  width:100%;
  height:14px;
}

.htu-spacer--sm{ height:10px; }
.htu-spacer--md{ height:18px; }
.htu-spacer--lg{ height:28px; }

/* image card */
.htu-card{
  display:flex;
  flex-direction:column;
  min-width:0;
  background:var(--htu-bg);
}

/* media area */
.htu-card__media{
  border-left:1px solid var(--htu-border);
  border-right:1px solid var(--htu-border);
  overflow:hidden;
  background:#fff;
}

/* image itself */
.htu-card__media img{
  display:block;
  width:100%;
  height:100%;
  object-fit:contain;
  background:#fff;
}

/* body area */
.htu-card__body{
  border-left:1px solid var(--htu-border);
  border-right:1px solid var(--htu-border);
  border-bottom:1px solid var(--htu-border);
  padding:10px 12px 12px;
  background:var(--htu-bg);
}

/* empty body allowed */
.htu-card__body:empty{
  padding:0;
  min-height:0;
  border-bottom:1px solid var(--htu-border);
}

/* paragraph text */
.htu-body{
  font-size:0.98rem;
  line-height:1.6;
  color:var(--htu-muted);
  word-break:keep-all;
  overflow-wrap:anywhere;
}

.htu-body + .htu-body{
  margin-top:6px;
}

.htu-body--left{ text-align:left; }
.htu-body--center{ text-align:center; }
.htu-body--right{ text-align:right; }

/* optional row grouping */
.htu-body-row{
  display:flex;
  gap:12px;
  align-items:flex-start;
  justify-content:space-between;
}

.htu-body-row .htu-body{
  flex:1 1 0;
  margin-top:0;
}

/* remark line */
.htu-remark{
  text-align:center;
  font-size:0.98rem;
  line-height:1.55;
  color:var(--htu-remark);

  margin:-8px 0 6px;
  padding:10px 14px;

  border:1px solid var(--htu-border);
  background:#fff;
}

/* full-width card (for 2:1 landscape items) */
.htu-card.htu-item--full{
  grid-column:1 / -1;
}

/* optional subtle visual rhythm */
.htu-card,
.htu-title,
.htu-remark{
  box-shadow:none;
  border-radius:0;
}

/* if you want slightly tighter mobile spacing */
@media (max-width: 900px){
  .htu-subject{
    font-size:1.18rem;
    padding:12px 12px 8px;
  }

  .htu-title{
    font-size:1.04rem;
    padding:9px 12px 7px;
  }

  .htu-card__body{
    padding:9px 10px 10px;
  }

  .htu-body{
    font-size:0.95rem;
    line-height:1.55;
  }

  .htu-remark{
    font-size:0.95rem;
    padding:9px 12px;
  }
}
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="brand">
      <div class="logo" aria-hidden="true"></div>
      <strong>Measure Master</strong>
    </div>

    <div class="right">
      <div class="lang">
        <button type="button" data-lang-btn="ko">
          <span class="flag" aria-hidden="true">🇰🇷</span>
          <span class="label">KO</span>
        </button>
        <button type="button" data-lang-btn="en">
          <span class="flag" aria-hidden="true">🇺🇸</span>
          <span class="label">EN</span>
        </button>
      </div>
    </div>
  </div>

  <div class="header-bottom">
    <nav>
      <a href="/index.html" data-i18n="idx.nav.home">Home</a>
      <a href="/howtouse.html" data-i18n="idx.nav.howtouse">How to use</a>
      <a href="/reviews.html" data-i18n="idx.nav.reviews">Reviews</a>
      <a href="/privacy.html" data-i18n="idx.nav.privacy">Privacy</a>
    </nav>
  </div>
</header>

<main>
  <section class="card howtouse">
    <h1>How to use Measure Master</h1>
    <p class="muted">
      Tap or click an image to open the full-size version in a new tab.
    </p>

    <div id="htuSteps" class="htu-steps"></div>
    <div id="htuGallery" class="htu-groups"></div>
  </section>
</main>

<footer>
  © <span id="year"></span> Measure Master. All rights reserved.
</footer>

<script>
(function () {
  const DATA_URL = "/assets/data/howtouse_layout.json";

  function tBySid(sid) {
    if (!sid) return "";
    if (window.mmI18n && typeof window.mmI18n.t === "function") {
      return window.mmI18n.t(sid);
    }
    return sid;
  }

  function resolveTextSpec(spec) {
    if (typeof spec === "string") {
      return { sid: spec, align: "left", dx: "0px" };
    }
    return {
      sid: spec?.sid || "",
      align: spec?.align || "left",
      dx: spec?.dx || "0px"
    };
  }

  function makeBodyLine(spec) {
    const s = resolveTextSpec(spec);
    const el = document.createElement("div");
    el.className = `htu-body htu-body--${s.align || "left"}`;
    el.textContent = tBySid(s.sid);

    if (s.dx && s.dx !== "0px") {
      el.style.position = "relative";
      el.style.left = s.dx;
    }
    return el;
  }

  function makeBodyRow(rowSpecs) {
    const row = document.createElement("div");
    row.className = "htu-body-row";
    (rowSpecs || []).forEach(spec => {
      row.appendChild(makeBodyLine(spec));
    });
    return row;
  }

  function buildSubject(item) {
    const el = document.createElement("div");
    el.className = "htu-subject";
    el.textContent = tBySid(item.sid);
    return el;
  }

  function buildTitle(item) {
    const el = document.createElement("div");
    el.className = "htu-title";
    if (item.fullWidth) el.classList.add("htu-item--full");
    el.textContent = tBySid(item.sid);

    if (item.align === "left") el.style.textAlign = "left";
    if (item.align === "right") el.style.textAlign = "right";
    if (item.align === "center") el.style.textAlign = "center";

    return el;
  }

  function buildRemark(item) {
    const el = document.createElement("div");
    el.className = "htu-remark";
    if (item.fullWidth !== false) el.classList.add("htu-item--full");
    el.textContent = tBySid(item.sid);

    if (item.align === "left") el.style.textAlign = "left";
    if (item.align === "right") el.style.textAlign = "right";
    if (item.align === "center") el.style.textAlign = "center";

    return el;
  }

  function buildSpacer(item) {
    const el = document.createElement("div");
    el.className = "htu-spacer";
    el.classList.add(`htu-spacer--${item.size || "md"}`);
    el.classList.add("htu-item--full");
    return el;
  }

  function buildCard(item) {
    const card = document.createElement("article");
    card.className = "htu-card";
    if (item.fullWidth) card.classList.add("htu-item--full");

    const media = document.createElement("div");
    media.className = "htu-card__media";

    if (item.ratio) {
      media.style.aspectRatio = item.ratio;
    }

    const img = document.createElement("img");
    img.src = item.src || "";
    img.alt = tBySid(item.altSid || "");
    img.loading = "lazy";
    img.decoding = "async";
    img.style.objectFit = item.fit || "contain";

    media.appendChild(img);
    card.appendChild(media);

    const hasTitle = !!(item.titleSid && String(item.titleSid).trim());
    const hasBodySids = Array.isArray(item.bodySids) && item.bodySids.length > 0;
    const hasBodyRows = Array.isArray(item.bodyRows) && item.bodyRows.length > 0;

    if (hasTitle || hasBodySids || hasBodyRows) {
      const body = document.createElement("div");
      body.className = "htu-card__body";

      if (hasTitle) {
        const title = document.createElement("div");
        title.className = "htu-card__title";
        title.textContent = tBySid(item.titleSid);
        body.appendChild(title);
      }

      if (hasBodyRows) {
        item.bodyRows.forEach(rowSpecs => {
          body.appendChild(makeBodyRow(rowSpecs));
        });
      } else if (hasBodySids) {
        item.bodySids.forEach(spec => {
          body.appendChild(makeBodyLine(spec));
        });
      }

      card.appendChild(body);
    }

    return card;
  }

  function getGridEl() {
    return (
      document.getElementById("htu-grid") ||
      document.querySelector("[data-htu-grid]") ||
      document.querySelector(".htu-grid")
    );
  }

  function clearGrid(grid) {
    while (grid.firstChild) grid.removeChild(grid.firstChild);
  }

  function renderItems(items) {
    const grid = getGridEl();
    if (!grid) {
      console.error("HowToUse grid container not found. Use #htu-grid or .htu-grid or [data-htu-grid].");
      return;
    }

    clearGrid(grid);

    items.forEach(item => {
      if (!item || !item.kind) return;

      let node = null;

      switch (item.kind) {
        case "subject":
          node = buildSubject(item);
          break;

        case "title":
          node = buildTitle(item);
          break;

        case "remark":
          node = buildRemark(item);
          break;

        case "spacer":
          node = buildSpacer(item);
          break;

        case "card":
          node = buildCard(item);
          break;

        default:
          console.warn("Unknown howtouse item kind:", item.kind, item);
          break;
      }

      if (node) {
        node.setAttribute("data-htu-id", item.id || "");
        grid.appendChild(node);
      }
    });
  }

  async function loadItems() {
    const res = await fetch(DATA_URL, { cache: "no-store" });
    if (!res.ok) {
      throw new Error(`Failed to load howtouse layout: ${res.status}`);
    }
    return await res.json();
  }

  async function bootHowToUse() {
    try {
      const items = await loadItems();
      console.log("HTU items loaded:", items.map(x => `${x.id}:${x.kind}`));
      renderItems(items);
    } catch (err) {
      console.error(err);
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    bootHowToUse();

    document.addEventListener("mm:i18n-updated", function () {
      bootHowToUse();
    });
  });
})();
</script>
</body>
</html>
